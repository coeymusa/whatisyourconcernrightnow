<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(199,50,27,0.20)" />
      <stop offset="60%" stop-color="rgba(199,50,27,0)" />
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c7321b" />
      <stop offset="70%" stop-color="#c7321b" />
      <stop offset="100%" stop-color="rgba(199,50,27,0)" />
    </radialGradient>
  </defs>

  <!-- ink background -->
  <rect width="1024" height="1024" fill="#0a0908" />

  <!-- atmospheric halo -->
  <circle cx="512" cy="512" r="440" fill="url(#halo)" />

  <!-- planet ring -->
  <circle
    cx="512" cy="512" r="376"
    fill="rgba(255,255,255,0.04)"
    stroke="rgba(250,246,237,0.32)"
    stroke-width="8"
  />

  <!-- concern dot, upper-right -->
  <circle cx="700" cy="340" r="160" fill="url(#dotGlow)" opacity="0.55" />
  <circle cx="700" cy="340" r="100" fill="#c7321b" />
</svg>
